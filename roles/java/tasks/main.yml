---
- name: Install SDKMAN
  ansible.builtin.shell:
    cmd: curl -s "https://get.sdkman.io" | bash
    creates: "/home/{{ item }}/.sdkman/bin/sdkman-init.sh"
  become_user: "{{ item }}"
  loop: "{{ desktop_user_names }}"

- name: Check Temurin Java installation
  ansible.builtin.shell:
    cmd: >
      source ~/.sdkman/bin/sdkman-init.sh 2>/dev/null
      && java -version 2>&1 || echo "NOT_INSTALLED"
    executable: /bin/bash
  become_user: "{{ item }}"
  loop: "{{ desktop_user_names }}"
  register: java_version_check
  changed_when: false
  failed_when: false

- name: Install Java (Temurin LTS) via SDKMAN
  ansible.builtin.shell:
    cmd: >
      source ~/.sdkman/bin/sdkman-init.sh
      && sdk install java
    executable: /bin/bash
  become_user: "{{ item.item }}"
  loop: "{{ java_version_check.results }}"
  when: '"Temurin" not in item.stdout'
  environment:
    SDKMAN_AUTO_ANSWER: "true"
  changed_when: true
